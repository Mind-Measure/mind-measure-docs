  <text x="64" y="78" font-size="24" font-weight="bold" fill="#204C4C" letter-spacing="2">CLIENT LAYER</text>

  <!-- 4 client boxes -->
  <g>
    <rect x="64" y="100" width="363" height="115" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <text x="245" y="150" font-size="30" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Student app</text>
    <text x="245" y="184" font-size="22" fill="#5C7070" text-anchor="middle">iOS &#183; Android (Capacitor)</text>
  </g>
  <g>
    <rect x="447" y="100" width="363" height="115" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <text x="628" y="150" font-size="30" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Employee app</text>
    <text x="628" y="184" font-size="22" fill="#5C7070" text-anchor="middle">iOS &#183; Android (Capacitor)</text>
  </g>
  <g>
    <rect x="830" y="100" width="363" height="115" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <text x="1011" y="150" font-size="30" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Admin dashboards</text>
    <text x="1011" y="184" font-size="22" fill="#5C7070" text-anchor="middle">University &#183; Pro (React)</text>
  </g>
  <g>
    <rect x="1213" y="100" width="363" height="115" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <text x="1394" y="150" font-size="30" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Content &amp; Insight hubs</text>
    <text x="1394" y="184" font-size="22" fill="#5C7070" text-anchor="middle">Next.js</text>
  </g>

  <!-- arrow 1 -> 2 -->
  <line x1="820" y1="240" x2="820" y2="282" stroke="#9AAEAE" stroke-width="3"/>
  <polygon points="820,292 812,278 828,278" fill="#9AAEAE"/>

  <!-- ============ BAND 2: EDGE & API ============ -->
  <rect x="40" y="292" width="1560" height="160" rx="16" fill="#F4F8F8" stroke="#DCE7E7" stroke-width="2"/>
  <text x="64" y="330" font-size="24" font-weight="bold" fill="#204C4C" letter-spacing="2">EDGE &amp; API</text>
  <g>
    <rect x="64" y="352" width="746" height="80" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <text x="437" y="388" font-size="29" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Vercel</text>
    <text x="437" y="416" font-size="21" fill="#5C7070" text-anchor="middle">Serverless API &#183; global CDN &#183; TLS 1.3</text>
  </g>
  <g>
    <rect x="830" y="352" width="746" height="80" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <text x="1203" y="388" font-size="29" font-weight="bold" fill="#1a1a1a" text-anchor="middle">AWS Cognito</text>
    <text x="1203" y="416" font-size="21" fill="#5C7070" text-anchor="middle">RS256 JWT &#183; MFA &#183; UK region</text>
  </g>

