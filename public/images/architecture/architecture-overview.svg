  <g>
    <rect x="64" y="726" width="484" height="150" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <rect x="430" y="742" width="100" height="40" rx="20" fill="#FF6B6B"/>
    <text x="480" y="770" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">70%</text>
    <text x="306" y="792" font-size="29" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Text analysis</text>
    <text x="306" y="828" font-size="21" fill="#5C7070" text-anchor="middle">AWS Bedrock</text>
    <text x="306" y="856" font-size="21" fill="#5C7070" text-anchor="middle">Claude 3.7 Sonnet</text>
  </g>
  <g>
    <rect x="578" y="726" width="484" height="150" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <rect x="944" y="742" width="100" height="40" rx="20" fill="#FF6B6B"/>
    <text x="994" y="770" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">15%</text>
    <text x="820" y="792" font-size="29" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Voice analysis</text>
    <text x="820" y="828" font-size="21" fill="#5C7070" text-anchor="middle">On-device acoustic</text>
    <text x="820" y="856" font-size="21" fill="#5C7070" text-anchor="middle">features (prosody)</text>
  </g>
  <g>
    <rect x="1092" y="726" width="484" height="150" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <rect x="1458" y="742" width="100" height="40" rx="20" fill="#FF6B6B"/>
    <text x="1508" y="770" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">15%</text>
    <text x="1334" y="792" font-size="29" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Facial analysis</text>
    <text x="1334" y="828" font-size="21" fill="#5C7070" text-anchor="middle">AWS Rekognition</text>
    <text x="1334" y="856" font-size="21" fill="#5C7070" text-anchor="middle">(when camera on)</text>
  </g>

  <!-- converge arrows to fusion -->
  <line x1="306" y1="876" x2="306" y2="904" stroke="#9AAEAE" stroke-width="3"/>
  <line x1="1334" y1="876" x2="1334" y2="904" stroke="#9AAEAE" stroke-width="3"/>
  <line x1="306" y1="904" x2="1334" y2="904" stroke="#9AAEAE" stroke-width="3"/>
  <line x1="820" y1="876" x2="820" y2="932" stroke="#9AAEAE" stroke-width="3"/>
  <line x1="820" y1="904" x2="820" y2="904" stroke="#9AAEAE" stroke-width="3"/>
  <polygon points="820,942 812,928 828,928" fill="#9AAEAE"/>

  <!-- Fusion -->
  <g>
    <rect x="370" y="942" width="900" height="78" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="2"/>
    <text x="820" y="978" font-size="29" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Fusion engine</text>
    <text x="820" y="1006" font-size="21" fill="#5C7070" text-anchor="middle">Weighted multimodal scoring &#183; graceful degradation</text>
  </g>

  <!-- arrow to score -->
  <line x1="820" y1="1020" x2="820" y2="1046" stroke="#9AAEAE" stroke-width="3"/>
  <polygon points="820,1056 812,1042 828,1042" fill="#9AAEAE"/>

