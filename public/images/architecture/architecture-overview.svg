<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="1540" viewBox="0 0 1640 1540" font-family="Helvetica, Arial, sans-serif">
  <rect width="1640" height="1540" fill="#ffffff"/>

  <!-- ============ BAND 1: CLIENT LAYER ============ -->
