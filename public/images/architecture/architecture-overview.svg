  <line x1="820" y1="658" x2="820" y2="688" stroke="#9AAEAE" stroke-width="3"/>
  <line x1="306" y1="688" x2="1334" y2="688" stroke="#9AAEAE" stroke-width="3"/>
  <line x1="306" y1="688" x2="306" y2="716" stroke="#9AAEAE" stroke-width="3"/>
  <polygon points="306,726 298,712 314,712" fill="#9AAEAE"/>
  <line x1="820" y1="688" x2="820" y2="716" stroke="#9AAEAE" stroke-width="3"/>
  <polygon points="820,726 812,712 828,712" fill="#9AAEAE"/>
  <line x1="1334" y1="688" x2="1334" y2="716" stroke="#9AAEAE" stroke-width="3"/>
  <polygon points="1334,726 1326,712 1342,712" fill="#9AAEAE"/>

