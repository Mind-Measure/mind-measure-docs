  <g>
    <rect x="470" y="1056" width="700" height="56" rx="28" fill="#FF6B6B"/>
    <text x="820" y="1094" font-size="29" font-weight="bold" fill="#ffffff" text-anchor="middle">Mind Measure Score  0 to 100</text>
  </g>

  <!-- arrow 3 -> 4 -->
  <line x1="820" y1="1128" x2="820" y2="1162" stroke="#9AAEAE" stroke-width="3"/>
  <polygon points="820,1172 812,1158 828,1158" fill="#9AAEAE"/>

  <!-- ============ BAND 4: DATA & STORAGE ============ -->
  <rect x="40" y="1172" width="1560" height="170" rx="16" fill="#F4F8F8" stroke="#DCE7E7" stroke-width="2"/>
  <text x="64" y="1210" font-size="24" font-weight="bold" fill="#204C4C" letter-spacing="2">DATA &amp; STORAGE</text>
  <g>
    <rect x="64" y="1232" width="746" height="92" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <text x="437" y="1272" font-size="29" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Aurora Serverless v2</text>
    <text x="437" y="1302" font-size="21" fill="#5C7070" text-anchor="middle">PostgreSQL &#183; encrypted at rest &#183; auto-scaling</text>
  </g>
  <g>
    <rect x="830" y="1232" width="746" height="92" rx="12" fill="#ffffff" stroke="#204C4C" stroke-width="1.5"/>
    <text x="1203" y="1272" font-size="29" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Amazon S3</text>
    <text x="1203" y="1302" font-size="21" fill="#5C7070" text-anchor="middle">Encrypted media &#183; audio deleted within 24h</text>
  </g>

  <!-- ============ FOOTER: CROSS-CUTTING ============ -->
  <rect x="40" y="1382" width="1560" height="118" rx="16" fill="#204C4C"/>
  <text x="820" y="1432" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Cross-cutting: AWS KMS &#183; Secrets Manager &#183; CloudWatch &#183; CloudTrail &#183; Sentry &#183; WAF</text>
  <text x="820" y="1470" font-size="22" fill="#CADADA" text-anchor="middle">All services run in AWS eu-west-2 (London). UK data residency end to end.</text>
</svg>
